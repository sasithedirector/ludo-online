services:
  - type: web
    name: ludo-online
    env: node
    plan: free
    # Install all deps (server + client) then build client
    buildCommand: npm run install:all && npm run build
    startCommand: cd server && NODE_ENV=production node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
    autoDeploy: true
